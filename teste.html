<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teste de instrumentos</title>
  <style>
    :root { color-scheme: dark; font-family: "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 24px; background: #0d1117; color: #e6edf3; }
    h1 { margin: 0 0 8px; }
    .warning { margin: 0 0 24px; color: #fbbf24; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(280px, 1fr)); gap: 18px; }
    .instrument { padding: 16px; border: 1px solid #30363d; border-radius: 14px; background: #161b22; }
    h2 { margin: 0 0 12px; text-align: center; }
    canvas { display: block; width: 100%; height: auto; margin: auto; }
    .controls { display: grid; gap: 12px; margin-top: 14px; }
    label { display: grid; grid-template-columns: 1fr auto; gap: 5px 12px; color: #aeb8c5; font-size: 14px; }
    label input, label select { grid-column: 1 / -1; width: 100%; }
    input[type="range"] { accent-color: #f59e0b; }
    select { padding: 7px; border: 1px solid #30363d; border-radius: 7px; background: #0f172a; color: #e6edf3; }
    output { color: #f59e0b; font-family: Consolas, monospace; }
    @media (max-width: 1000px) { .grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 680px) { body { padding: 14px; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>Teste de instrumentos JavaScript</h1>
  <p class="warning">Demonstração educativa não certificada — não utilizar para navegação real.</p>

  <main class="grid">
    <section class="instrument">
      <h2>HSI</h2>
      <canvas id="hsi" width="360" height="360"></canvas>
      <div class="controls">
        <label>Rumo <output id="hsi-heading-value">045°</output><input id="hsi-heading" type="range" min="0" max="359" value="45"></label>
        <label>Curso <output id="hsi-course-value">090°</output><input id="hsi-course" type="range" min="0" max="359" value="90"></label>
        <label>Desvio CDI <output id="hsi-deviation-value">0.4</output><input id="hsi-deviation" type="range" min="-2" max="2" step="0.1" value="0.4"></label>
      </div>
    </section>

    <section class="instrument">
      <h2>RMI</h2>
      <canvas id="rmi" width="360" height="360"></canvas>
      <div class="controls">
        <label>Rumo <output id="rmi-heading-value">045°</output><input id="rmi-heading" type="range" min="0" max="359" value="45"></label>
        <label>Bearing VOR <output id="rmi-vor-value">110°</output><input id="rmi-vor" type="range" min="0" max="359" value="110"></label>
        <label>Bearing ADF <output id="rmi-adf-value">285°</output><input id="rmi-adf" type="range" min="0" max="359" value="285"></label>
      </div>
    </section>

    <section class="instrument">
      <h2>VOR standard</h2>
      <canvas id="vor" width="360" height="360"></canvas>
      <div class="controls">
        <label>OBS / Curso <output id="vor-course-value">090°</output><input id="vor-course" type="range" min="0" max="359" value="90"></label>
        <label>Desvio CDI <output id="vor-deviation-value">-0.6</output><input id="vor-deviation" type="range" min="-2" max="2" step="0.1" value="-0.6"></label>
        <label>Indicação
          <select id="vor-flag"><option value="TO">TO</option><option value="FROM">FROM</option><option value="OFF">OFF / NAV</option></select>
        </label>
      </div>
    </section>
  </main>

  <script src="static/js/hsi.js"></script>
  <script src="static/js/rmi.js"></script>
  <script src="static/js/vor-indicator.js"></script>
  <script>
    const degrees = (value) => String(Math.round(value)).padStart(3, "0") + "°";
    const bindRange = (id, outputId, update, format = degrees) => {
      const input = document.getElementById(id);
      const output = document.getElementById(outputId);
      input.addEventListener("input", () => {
        const value = Number(input.value);
        output.value = format(value);
        update(value);
      });
    };

    const hsi = new HSIInstrument(document.getElementById("hsi"), {heading: 45, course: 90, deviation: 0.4});
    bindRange("hsi-heading", "hsi-heading-value", (heading) => hsi.setState({heading}));
    bindRange("hsi-course", "hsi-course-value", (course) => hsi.setState({course}));
    bindRange("hsi-deviation", "hsi-deviation-value", (deviation) => hsi.setState({deviation}), (value) => value.toFixed(1));

    const rmi = new RMIInstrument(document.getElementById("rmi"), {heading: 45, vorBearing: 110, adfBearing: 285});
    bindRange("rmi-heading", "rmi-heading-value", (heading) => rmi.setState({heading}));
    bindRange("rmi-vor", "rmi-vor-value", (vorBearing) => rmi.setState({vorBearing}));
    bindRange("rmi-adf", "rmi-adf-value", (adfBearing) => rmi.setState({adfBearing}));

    const vor = new VORIndicator(document.getElementById("vor"), {course: 90, deviation: -0.6, flag: "TO"});
    bindRange("vor-course", "vor-course-value", (course) => vor.setState({course}));
    bindRange("vor-deviation", "vor-deviation-value", (deviation) => vor.setState({deviation}), (value) => value.toFixed(1));
    document.getElementById("vor-flag").addEventListener("change", (event) => vor.setState({flag: event.target.value}));
  </script>
</body>
</html>
